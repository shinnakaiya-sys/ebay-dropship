# GitHub Actions: 24時間ごと自動実行ワークフロー
# .github/workflows/daily_check.yml に配置

name: 24時間ごとチェック（価格・在庫）

on:
  # 24時間ごとに実行（JST 10:23 = UTC 1:23）
  # ※ 整数時刻・*/24 は混雑でスキップされやすいため端数時刻に設定
  schedule:
    - cron: "23 1 * * *"

  # 手動実行ボタン
  workflow_dispatch:

jobs:
  daily-check:
    runs-on: ubuntu-latest
    timeout-minutes: 340  # 5時間40分でタイムアウト（GitHub上限6時間より前に確実に終了）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: pip install keepa requests gspread google-auth pandas python-dotenv

      - name: .env ファイルを作成
        run: |
          echo "KEEPA_API_KEY=${{ secrets.KEEPA_API_KEY }}" >> .env
          echo "EBAY_TOKEN=${{ secrets.EBAY_TOKEN }}" >> .env
          echo "EBAY_OAUTH_TOKEN=${{ secrets.EBAY_OAUTH_TOKEN }}" >> .env
          echo "EBAY_APP_ID=${{ secrets.EBAY_APP_ID }}" >> .env
          echo "EBAY_CLIENT_SECRET=${{ secrets.EBAY_CLIENT_SECRET }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "SHEET_ID=${{ secrets.SHEET_ID }}" >> .env
          echo "SLACK_WEBHOOK=${{ secrets.SLACK_WEBHOOK }}" >> .env
          echo "LINE_TOKEN=${{ secrets.LINE_TOKEN }}" >> .env

      - name: Google認証ファイルを作成
        run: echo "$GSHEET_CREDENTIALS" > credentials.json
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}

      - name: 毎日チェック実行
        run: python run.py
